<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
  <title>heart letter by alexx_deev</title>
  <link rel="stylesheet" href="./style.css">

</head>

<body>
  <div class="envlope-wrapper">
    <div id="envelope" class="close">
      <div class="hearts-idle">
        <div class="heart-idle h1">❤️</div>
        <div class="heart-idle h2">✨</div>
        <div class="heart-idle h3">💖</div>
        <div class="heart-idle h4">🌸</div>
      </div>
      <div class="front flap"></div>
      <div class="front pocket"></div>
      <div class="letter">
        <div class="text">
          you are my forever,<br>
          my always,<br>
          my sweetest love
        </div>
      </div>
      <div class="hearts">
        <div class="heart a1 unique"><span>I</span></div>
        <div class="heart a2 unique"><span>Love</span></div>
        <div class="heart a3 unique"><span>you</span></div>
        <div class="heart a4"></div>
        <div class="heart a5"></div>
        <div class="heart a6"></div>
      </div>
    </div>
  </div>
  <div class="reset">
    <button id="open">Open</button>
    <button id="reset">Reset</button>
  </div>

  <!-- 

Inspired by:

-->
  <!-- partial -->
  <script src='script.js'></script>

</body>

</html>
